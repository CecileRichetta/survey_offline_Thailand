{{ block scripts }}
<!doctype html>
<html lang="en">
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">



    <style>
        .progress-text {
            text-align: right;
            color: grey;
            font-size: 11px;
            width: 100%; /* Ensures the text spans the full width of its container */
        }
    </style>
{{ endblock }}

{{ block title }}
        <p class="progress-text" >
            ความก้าวหน้าของแบบสอบถาม: ส่วนที่ 6/10
        </p>
{{ endblock }}

{{ block content }}
    <h3 class="mb-4 text-center text-primary">
        <b> ข้อมูลทั่วไป</b>
    </h3>
<h5>
    {{ formfields }}
</h5>
    <p class="text-center">
        <button class="btn btn-primary">
            หน้าถัดไป
        </button>
    </p>
{{ endblock }}

{{ block options }}
</html>
{{ endblock }}
